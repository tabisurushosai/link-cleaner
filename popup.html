<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --border: #6b7280;
      --border-subtle: #e5e7eb;
      --primary: #0b5ed7;
      --premium: #146c43;
      --focus: #111827;
      --success: #0f766e;
      --error: #b91c1c;
      --control-bg: #f8f9fa;
      --disabled-bg: #e5e7eb;
      --disabled-text: #4b5563;
      --disabled-border: #9ca3af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.25;
    }

    .url-section {
      margin-bottom: 10px;
    }

    .guide-text,
    .empty-state {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .empty-state {
      padding: 10px;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      background: #f9fafb;
    }

    .empty-state[hidden] {
      display: none;
    }

    .url-label,
    .field-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .url-value {
      min-height: 2.8em;
      padding: 10px;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      background: #f9fafb;
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    #original-url {
      color: var(--muted);
      text-decoration: line-through;
    }

    #cleaned-url {
      font-weight: 700;
    }

    button,
    input {
      min-height: 44px;
      min-width: 44px;
      font: inherit;
    }

    button {
      border-radius: 6px;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:focus-visible,
    input:focus-visible,
    .url-value:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    button:disabled,
    input:disabled {
      border-color: var(--disabled-border);
      background: var(--disabled-bg);
      color: var(--disabled-text);
      cursor: not-allowed;
      opacity: 1;
    }

    .primary-button {
      width: 100%;
      margin-top: 10px;
      padding: 10px 12px;
      border: 0;
      background: var(--primary);
      color: #ffffff;
      font-weight: 700;
    }

    .premium-button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px 12px;
      border: 0;
      background: var(--premium);
      color: #ffffff;
      font-weight: 700;
    }

    .add-button {
      flex: 0 0 auto;
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: var(--control-bg);
      color: var(--text);
      font-weight: 600;
    }

    .status-message {
      min-height: 1.4em;
      margin-top: 8px;
      color: var(--success);
      font-size: 12px;
      font-weight: 600;
    }

    .status-message.is-error {
      color: var(--error);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .divider {
      margin: 16px 0;
      border: 0;
      border-top: 1px solid var(--border-subtle);
    }

    #premium-section {
      font-size: 12px;
    }

    #subscription-status {
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 600;
    }

    .param-controls {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    #custom-param-input {
      flex: 1 1 auto;
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
    }

    @media (prefers-contrast: more) {
      button:focus-visible,
      input:focus-visible {
        outline-color: #000000;
      }
    }
  </style>
</head>
<body>
<main id="app" aria-labelledby="app-title">
  <h1 id="app-title" data-i18n="appName">すっきりリンク</h1>
  <p id="keyboard-help" class="visually-hidden" data-i18n="keyboardHelp">Tabキーで項目を移動し、EnterまたはSpaceでボタンを実行できます。</p>
  <p id="onboarding-guide" class="guide-text" data-i18n="onboardingGuide">ページを開いたら、このボタンからすっきりした共有リンクをコピーできます。</p>
  <p id="empty-state" class="empty-state" data-i18n="emptyStateNoUrl" role="status" aria-live="polite" hidden>URLを取得できませんでした。Webページを開いてから拡張機能をもう一度開いてください。</p>

  <section class="url-section" aria-labelledby="original-url-label">
    <div id="original-url-label" class="url-label" data-i18n="labelBefore">除去前：</div>
    <div id="original-url" class="url-value" role="textbox" aria-readonly="true" tabindex="0" data-i18n="statusLoading" data-i18n-aria-label="originalUrlAriaLabel">読み込み中…</div>
  </section>

  <section class="url-section" aria-labelledby="cleaned-url-label">
    <div id="cleaned-url-label" class="url-label" data-i18n="labelAfter">除去後：</div>
    <div id="cleaned-url" class="url-value" role="textbox" aria-readonly="true" tabindex="0" data-i18n="statusLoading" data-i18n-aria-label="cleanedUrlAriaLabel">読み込み中…</div>
  </section>

  <button id="copy-btn" class="primary-button" type="button" data-i18n="buttonCopy" data-i18n-aria-label="copyCleanedUrlAriaLabel" aria-controls="cleaned-url" aria-describedby="keyboard-help status">コピー</button>
  <div id="status" class="status-message" role="status" aria-live="polite" aria-atomic="true"></div>

  <hr class="divider">

  <section id="premium-section" aria-labelledby="custom-param-label">
    <div id="subscription-status" role="status" aria-live="polite" aria-atomic="true"></div>
    <button id="buy-btn" class="premium-button" type="button" data-i18n="buttonBuy" data-i18n-aria-label="buyPremiumAriaLabel" aria-describedby="subscription-status keyboard-help" hidden>プレミアムにアップグレード（$3買い切り）</button>

    <label id="custom-param-label" class="field-label" for="custom-param-input" data-i18n="customParamLabel">カスタムルール</label>
    <div class="param-controls">
      <input type="text" id="custom-param-input" autocomplete="off" data-i18n-placeholder="placeholderAddParam" aria-describedby="subscription-status custom-param-label keyboard-help">
      <button id="add-param-btn" class="add-button" type="button" data-i18n="buttonAddParam" data-i18n-aria-label="addCustomRuleAriaLabel" aria-describedby="subscription-status keyboard-help">ルールを追加</button>
    </div>
  </section>
</main>
<script type="module" src="/src/popup.ts"></script>
</body>
</html>
