<!doctype html><html><head><meta charset="utf-8"></head><body style="width:320px;font-family:system-ui;padding:10px"><h3 data-i18n="appName">すっきりリンク</h3><div id="app">
  <div style="margin-bottom: 8px;">
    <div data-i18n="labelBefore" style="font-size: 10px; color: #999; margin-bottom: 2px;">除去前:</div>
    <div style="font-size: 11px; color: #666; word-break: break-all; text-decoration: line-through; opacity: 0.7;" id="original-url" data-i18n="statusLoading">Loading...</div>
  </div>
  <div style="margin-bottom: 8px;">
    <div data-i18n="labelAfter" style="font-size: 10px; color: #999; margin-bottom: 2px;">除去後:</div>
    <div style="font-size: 12px; color: #333; word-break: break-all; font-weight: bold;" id="cleaned-url" data-i18n="statusLoading">Loading...</div>
  </div>
  <button id="copy-btn" data-i18n="buttonCopy" style="margin-top: 10px; width: 100%; padding: 8px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px;">コピー</button>
  <div id="status" style="font-size: 10px; color: green; margin-top: 4px; height: 1em;"></div>

  <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">

  <div id="premium-section" style="font-size: 11px;">
    <div id="subscription-status" style="color: #666; margin-bottom: 8px;"></div>
    <button id="buy-btn" data-i18n="buttonBuy" style="display:none; width: 100%; padding: 6px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; margin-bottom: 8px;">Upgrade</button>
    
    <div style="display: flex; gap: 4px;">
      <input type="text" id="custom-param-input" style="flex: 1; padding: 4px; font-size: 11px; border: 1px solid #ccc; border-radius: 4px;" data-i18n-placeholder="placeholderAddParam">
      <button id="add-param-btn" data-i18n="buttonAddParam" style="padding: 4px 8px; cursor: pointer; font-size: 11px; border: 1px solid #ccc; background: #f8f9fa; border-radius: 4px;">Add</button>
    </div>
  </div>
</div><script type="module" src="/src/popup.ts"></script></body></html>
