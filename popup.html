<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title data-i18n="appName">すっきりリンク</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --surface: #f8fafc;
      --surface-strong: #f1f5f9;
      --text: #1f2937;
      --muted: #475569;
      --border: #64748b;
      --border-subtle: #cbd5e1;
      --primary: #0b5ed7;
      --primary-strong: #084298;
      --primary-soft: #dbeafe;
      --premium: #146c43;
      --focus: #111827;
      --success: #0f5f59;
      --success-soft: #ccfbf1;
      --error: #991b1b;
      --error-soft: #fee2e2;
      --control-bg: #ffffff;
      --disabled-bg: #e2e8f0;
      --disabled-text: #4b5563;
      --disabled-border: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    main {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      margin: 0;
      color: #0f172a;
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    .url-section {
      padding: 10px;
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      background: var(--surface);
    }

    .guide-text,
    .empty-state {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .guide-text {
      padding: 10px 12px;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      background: var(--primary-soft);
    }

    .empty-state {
      padding: 12px;
      border: 1px solid #fed7aa;
      border-radius: 10px;
      background: #fff7ed;
    }

    .empty-state[hidden] {
      display: none;
    }

    .guide-title,
    .empty-state-title {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-weight: 700;
    }

    .empty-state-action {
      display: block;
      margin-top: 6px;
      color: var(--primary-strong);
      font-weight: 700;
    }

    .url-label,
    .field-label {
      display: block;
      margin-bottom: 6px;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
    }

    .url-value {
      min-height: 2.8em;
      padding: 9px 10px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    #original-url {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      text-decoration-color: #94a3b8;
    }

    .url-value.is-loading {
      border-style: dashed;
      background: var(--surface);
      color: var(--muted);
      font-family: inherit;
      font-weight: 600;
    }

    .url-value.is-empty {
      border-color: #fed7aa;
      background: #fff7ed;
      color: #9a3412;
      font-family: inherit;
      font-weight: 600;
    }

    #original-url.is-empty {
      text-decoration: none;
    }

    #cleaned-url.is-cleaned {
      border-color: #5eead4;
      background: #f0fdfa;
      color: #134e4a;
      font-weight: 700;
    }

    button,
    input {
      min-height: 48px;
      min-width: 48px;
      font: inherit;
    }

    button {
      border-radius: 6px;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:focus-visible,
    input:focus-visible,
    .url-value:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
      box-shadow: 0 0 0 5px #ffffff;
    }

    button:disabled,
    input:disabled {
      border-color: var(--disabled-border);
      background: var(--disabled-bg);
      color: var(--disabled-text);
      cursor: not-allowed;
      opacity: 1;
    }

    .primary-button {
      width: 100%;
      padding: 10px 12px;
      border: 0;
      background: var(--primary);
      color: #ffffff;
      font-weight: 700;
    }

    .premium-button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px 12px;
      border: 0;
      background: var(--premium);
      color: #ffffff;
      font-weight: 700;
    }

    .add-button {
      flex: 0 0 auto;
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: var(--control-bg);
      color: var(--text);
      font-weight: 600;
    }

    .status-message {
      margin: 0;
      padding: 9px 10px;
      border: 1px solid #5eead4;
      border-radius: 8px;
      background: var(--success-soft);
      color: var(--success);
      font-size: 12px;
      font-weight: 600;
    }

    .status-message:empty {
      min-height: 0;
      padding: 0;
      border-color: transparent;
      background: transparent;
    }

    .status-message.is-error {
      border-color: #fecaca;
      background: var(--error-soft);
      color: var(--error);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .divider {
      margin: 4px 0;
      border: 0;
      border-top: 1px solid var(--border-subtle);
    }

    #premium-section {
      padding: 10px;
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      background: var(--surface-strong);
      font-size: 12px;
    }

    #subscription-status {
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 600;
    }

    .param-controls {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    #custom-param-input {
      flex: 1 1 auto;
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
    }

    @media (prefers-contrast: more) {
      button:focus-visible,
      input:focus-visible,
      .url-value:focus-visible {
        outline-color: #000000;
        outline-width: 4px;
      }
    }
  </style>
</head>
<body>
<main id="app" aria-labelledby="app-title">
  <h1 id="app-title" data-i18n="appName">すっきりリンク</h1>
  <p id="keyboard-help" class="visually-hidden" data-i18n="keyboardHelp">Tab キーで項目間を移動し、Enter キーまたはスペースキーでボタンを押せます。</p>
  <p id="url-display-help" class="visually-hidden" data-i18n="urlDisplayHelp">URL 欄は読み取り専用です。除去後のリンクをコピーするには「コピー」ボタンを使います。</p>
  <div id="onboarding-guide" class="guide-text" role="note" aria-labelledby="onboarding-guide-title">
    <strong id="onboarding-guide-title" class="guide-title" data-i18n="onboardingTitle">初めての方へ</strong>
    <span data-i18n="onboardingGuide">開いているページの URL から追跡パラメータを取り除き、共有しやすいリンクとしてコピーできます。</span>
  </div>
  <div id="empty-state" class="empty-state" role="status" aria-live="polite" aria-labelledby="empty-state-title" aria-describedby="empty-state-description empty-state-action" hidden>
    <strong id="empty-state-title" class="empty-state-title" data-i18n="emptyStateTitle">ページのURLが見つかりません</strong>
    <span id="empty-state-description" data-i18n="emptyStateNoUrl">Chrome の新しいタブ、設定画面、Chrome ウェブストアなどでは URL を取得できません。</span>
    <span id="empty-state-action" class="empty-state-action" data-i18n="emptyStateOpenPageAction">通常の Web ページを開いてから、もう一度すっきりリンクを開いてください。</span>
  </div>

  <section class="url-section" aria-labelledby="original-url-label">
    <div id="original-url-label" class="url-label" data-i18n="labelBefore">除去前：</div>
    <div id="original-url" class="url-value is-loading" role="textbox" aria-readonly="true" aria-busy="true" aria-describedby="url-display-help" tabindex="0" data-i18n="statusLoading" data-i18n-aria-label="originalUrlAriaLabel">読み込み中…</div>
  </section>

  <section class="url-section" aria-labelledby="cleaned-url-label">
    <div id="cleaned-url-label" class="url-label" data-i18n="labelAfter">除去後：</div>
    <div id="cleaned-url" class="url-value is-loading" role="textbox" aria-readonly="true" aria-busy="true" aria-describedby="url-display-help" tabindex="0" data-i18n="statusLoading" data-i18n-aria-label="cleanedUrlAriaLabel">読み込み中…</div>
  </section>

  <button id="copy-btn" class="primary-button" type="button" data-i18n="buttonCopy" data-i18n-aria-label="copyCleanedUrlAriaLabel" aria-controls="cleaned-url" aria-describedby="onboarding-guide keyboard-help status">コピー</button>
  <div id="status" class="status-message" role="status" aria-live="polite" aria-atomic="true"></div>

  <hr class="divider">

  <section id="premium-section" aria-labelledby="custom-param-label">
    <div id="subscription-status" role="status" aria-live="polite" aria-atomic="true"></div>
    <button id="buy-btn" class="premium-button" type="button" data-i18n="buttonBuy" data-i18n-aria-label="buyPremiumAriaLabel" aria-describedby="subscription-status keyboard-help" hidden>プレミアムにアップグレード（US$3・買い切り）</button>

    <label id="custom-param-label" class="field-label" for="custom-param-input" data-i18n="customParamLabel">カスタムルール</label>
    <div class="param-controls">
      <input type="text" id="custom-param-input" autocomplete="off" data-i18n-placeholder="placeholderAddParam" aria-describedby="subscription-status custom-param-label keyboard-help">
      <button id="add-param-btn" class="add-button" type="button" data-i18n="buttonAddParam" data-i18n-aria-label="addCustomRuleAriaLabel" aria-describedby="subscription-status keyboard-help">ルールを追加</button>
    </div>
  </section>
</main>
<script type="module" src="/src/popup.ts"></script>
</body>
</html>
